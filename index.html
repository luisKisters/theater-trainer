<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Theater Trainer</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <meta name="theme-color" content="#000000" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script type="importmap">
  {
    "imports": {
      "@google/genai": "https://esm.run/@google/genai@latest"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <nav class="topbar" id="topbar">
      <div class="app-title">Theater Trainer</div>
      <div class="nav-tabs" id="nav-tabs">
        <button class="nav-tab" data-view="library">Library</button>
        <button class="nav-tab" data-view="add">Add Script</button>
        <button class="nav-tab" data-view="rehearse">Rehearse</button>
        <button class="nav-tab" data-view="settings">Settings</button>
      </div>
    </nav>
    <main id="main-content">
      <div id="view-library" class="view" role="main" aria-label="Script Library"></div>
      <div id="view-add" class="view" role="main" aria-label="Add Script"></div>
      <div id="view-rehearse" class="view" role="main" aria-label="Rehearse"></div>
      <div id="view-settings" class="view" role="main" aria-label="Settings"></div>
    </main>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
